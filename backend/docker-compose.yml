services:
  postgres:
    image: postgres:15
    container_name: ai-companion-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_companion
      POSTGRES_USER: ai_companion
      POSTGRES_PASSWORD: ai_companion_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_companion -d ai_companion"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: ai-companion-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
  redis_data:
